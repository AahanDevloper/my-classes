<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Joining Form</title>
    <!-- Bootstrap css link  -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <!-- javascript -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- container -->
    <div class="container mt-4">
      <div class="card shadow">
        <!-- header -->
        <div class="card-header bg-primary text-white text-center">
          <h2>Course Joining Form</h2>
        </div>
        <!-- body -->
        <div class="card-body">
          <form>
            <!-- name -->
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input
                type="text"
                class="form-control"
                placeholder="Enter Full Name"
              />
            </div>

            <!-- School -->
            <div class="mb-3">
              <label class="form-label">School's Name</label>
              <input
                type="text"
                class="form-control"
                placeholder="Enter School's Name"
              />
            </div>

            <!-- class -->
            <div class="mb-3">
              <label class="form-label">Grade</label>
              <select class="form-select">
                <option selected>Select your class...</option>
                <option>1<sup>st</sup></option>
                <option>2<sup>nd</sup></option>
                <option>3<sup>rd</sup></option>
                <option>4<sup>th</sup></option>
                <option>5<sup>th</sup></option>
                <option>6<sup>th</sup></option>
                <option>7<sup>th</sup></option>
                <option>8<sup>th</sup></option>
                <option>9<sup>th</sup></option>
                <option>10<sup>th</sup></option>
                <option>11<sup>th</sup></option>
                <option>12<sup>th</sup></option>
              </select>
            </div>
            <!-- email -->
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input
                type="email"
                class="form-control"
                placeholder="Enter Email"
              />
            </div>

            <!-- phone number -->
            <div class="mb-3">
              <label class="form-label">Phone number</label>
              <input
                type="number"
                class="form-control"
                placeholder="Enter Phone Number"
              />
            </div>
            <!-- dob -->
            <div class="mb-3">
              <label class="form-label">Date of Birth</label>
              <input
                type="date"
                class="form-control"
              />
            </div>
            <!-- gender -->
            <div class="mb-3">
              <label class="form-label">Gender</label>
              <div class="form-check form-check-line">
                <!-- male -->
                <input type="radio" class="form-check-input" name="gender" />
                <label class="form-check-line">Male</label>
              </div>
              <div class="form-check form-check-line">
                <!-- female -->
                <input type="radio" class="form-check-input" name="gender" />
                <label class="form-check-line">Female</label>
              </div>
            </div>

            <!-- Course -->
            <div class="mb-3">
              <label class="form-label">Course</label>
              <select class="form-select">
                <option selected>Select course...</option>
                <option>Detailed Maths</option>
                <option>Playing with numbers</option>
                <option>Science Mastery</option>
                <option>Physics Fundamentals</option>
                <option>Chemestry Fundamentals</option>
                <option>Political Science</option>
              </select>
            </div>

            <!-- address -->
            <div class="mb-3">
              <label class="form-label">Address</label>
              <textarea class="form-control"></textarea>
            </div>
            <!-- checkbox -->
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" />
              <label class="form-label-check"
                >I agree to all Terms and Conditions</label
              >
            </div>
            <!-- button -->
            <div class="d-grid">
              <button class="btn btn-success" type="submit">Submit</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
